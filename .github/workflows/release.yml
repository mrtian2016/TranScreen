name: Release

# Builds an unsigned TranScreen.app zip and publishes it as a GitHub Release.
# Trigger by pushing a tag like v1.2.3, or run manually from the Actions tab.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to release (e.g. v1.2.3)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    env:
      SCHEME: TranScreen
      CONFIGURATION: Release
      DERIVED_DATA: build/DerivedData

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Select latest Xcode
        run: |
          set -euo pipefail
          XCODE=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$XCODE" ]; then
            XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -n 1)
          fi
          if [ -z "$XCODE" ]; then echo "::error::No Xcode found on runner"; exit 1; fi
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Resolve tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "archive=TranScreen-${TAG}-unsigned.zip" >> "$GITHUB_OUTPUT"

      - name: Build unsigned app
        run: |
          set -euo pipefail
          rm -rf build
          xcodebuild \
            -project TranScreen.xcodeproj \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package app zip
        id: artifacts
        run: |
          set -euo pipefail
          APP_PATH="$DERIVED_DATA/Build/Products/$CONFIGURATION/TranScreen.app"
          ZIP_PATH="build/${{ steps.ver.outputs.archive }}"

          if [ ! -d "$APP_PATH" ]; then
            echo "::error::TranScreen.app was not found at $APP_PATH"
            find "$DERIVED_DATA/Build/Products" -maxdepth 3 -print || true
            exit 1
          fi

          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"
          echo "zip=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "zip_name=$(basename "$ZIP_PATH")" >> "$GITHUB_OUTPUT"

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          This release contains an unsigned, unnotarized TranScreen.app zip.

          Because this build is unsigned, macOS may block it after you copy TranScreen.app to /Applications.
          After installing, run these commands:

          ```bash
          xattr -dr com.apple.quarantine /Applications/TranScreen.app
          open /Applications/TranScreen.app
          ```

          If macOS still blocks the app, run the same commands again after confirming TranScreen.app is in /Applications:

          ```bash
          xattr -dr com.apple.quarantine /Applications/TranScreen.app
          open /Applications/TranScreen.app
          ```

          Signed/notarized build by Martin:
          https://github.com/mrtian2016/TranScreen/releases/tag/${{ steps.ver.outputs.tag }}
          EOF

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifacts.outputs.zip_name }}
          path: ${{ steps.artifacts.outputs.zip }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          draft: false
          prerelease: false
          body_path: release-notes.md
          files: ${{ steps.artifacts.outputs.zip }}
